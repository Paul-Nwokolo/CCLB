# =============================================================
#  .github/workflows/gitleaks.yml
#  Scans the whole repository — including its FULL commit history —
#  for accidentally-committed secrets (API keys, tokens, passwords…).
#
#  It runs the open-source gitleaks CLI directly, so it is 100% free
#  and works on PUBLIC or PRIVATE repos, and on personal accounts OR
#  organisations, with NO licence key required. (The gitleaks GitHub
#  "Action" needs a paid licence for organisations — running the CLI
#  the way we do here avoids that entirely.)
#
#  A red ✗ on a run means a possible secret was found: open the run
#  log, see which file/commit it is in, remove it, and rotate it.
# =============================================================

name: Secret scan (gitleaks)

on:
  push:
  pull_request:
  workflow_dispatch:          # lets you run it by hand from the "Actions" tab
  schedule:
    - cron: "0 6 * * 1"       # and automatically every Monday at 06:00 UTC

permissions:
  contents: read              # least privilege: the scan only needs to read code

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # 0 = every commit, so secrets in OLD commits are caught too

      - name: Install gitleaks
        run: |
          VERSION="8.30.1"     # bump this to the latest tag occasionally
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repository for secrets
        # --redact hides the secret value in the logs; --exit-code 1 fails the build if anything is found.
        run: gitleaks git . -v --redact --exit-code 1
